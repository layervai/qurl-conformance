name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1.0.174
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # This is the default GITHUB_TOKEN actor; Release Please is currently
          # its only PR author. Keep the allowlist exact; this workflow can
          # read and comment but not push.
          allowed_bots: 'github-actions[bot]'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This repo is a multi-language conformance-vector package: a stdlib-only Go
            module plus npm (TypeScript/JS) and Python wrappers, all distributing the same
            JSON conformance vectors. Review the Go, TypeScript/JS, and Python wrapper code
            and the conformance vector JSON. Focus on:
            - Clear, simple, idiomatic code in whichever language the change touches (Go, TS/JS, Python)
            - Conformance vector JSON: well-formed, schema-consistent, and byte-identical across the root/npm/python copies (no drift)
            - Error handling (failing closed / hard-failing on malformed or missing fixtures rather than silently skipping)
            - Security (no hardcoded credentials, proper input validation, safe crypto usage, no private-repo leakage in vectors or docs)
            - Test coverage across all three language wrappers, including the cross-language compatibility checks

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          claude_args: '--model claude-opus-4-8 --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
