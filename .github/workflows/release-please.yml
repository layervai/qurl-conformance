name: Release Please
on:
  push:
    branches: [main]
permissions:
  contents: write
  pull-requests: write
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      npm_release_created: ${{ steps.release.outputs['npm--release_created'] }}
      npm_tag_name: ${{ steps.release.outputs['npm--tag_name'] }}
      python_release_created: ${{ steps.release.outputs['python--release_created'] }}
      python_tag_name: ${{ steps.release.outputs['python--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.npm_release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin to the tag release-please just pushed so a post-merge
          # commit on `main` can't sneak into the published tarball.
          ref: ${{ needs.release-please.outputs.npm_tag_name }}
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          # Required for OIDC trusted publishing — npm runs the OIDC exchange
          # against this registry.
          registry-url: "https://registry.npmjs.org"
      # Trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.x.
      - name: Pin npm for trusted publishing
        run: npm install -g npm@11.10.0
      # Trusted publishing (OIDC): no NODE_AUTH_TOKEN. With the job's
      # `id-token: write`, npm authenticates via the trusted publisher
      # configured for @layervai/qurl-conformance on npmjs.com (provider
      # GitHub Actions, repo layervai/qurl-conformance, workflow
      # release-please.yml, environment npm-publish).
      - name: Publish to npm
        run: npm publish --provenance
        working-directory: npm

  publish-pypi:
    needs: release-please
    if: needs.release-please.outputs.python_release_created == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release-please.outputs.python_tag_name }}
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build
        run: python -m build
        working-directory: python
      # Trusted publishing (OIDC) + PEP 740 attestations. With the job's
      # `id-token: write`, pypi authenticates via the pending/trusted
      # publisher configured for qurl-conformance on PyPI (workflow
      # release-please.yml, environment pypi).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Must override — default is repo-root dist/, but we build in python/.
          packages-dir: python/dist/
          # Set PEP 740 attestation behavior explicitly rather than relying
          # on the default.
          attestations: true
