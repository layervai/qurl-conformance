name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conformance:
    name: vectors + go + cross-language
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Root module — test/vet/fmt
        run: |
          # go.mod is the root compatibility source of truth. This equality
          # proves setup-go selected its exact patch rather than floating 1.26.x.
          # It deliberately assumes go.mod has no toolchain directive.
          expected_go="go$(awk '$1 == "go" { print $2 }' go.mod)"
          test "$(go env GOVERSION)" = "$expected_go"
          go test ./...
          go vet ./...
          if [ -n "$(gofmt -l .)" ]; then echo "::error::gofmt"; gofmt -l .; exit 1; fi

      - name: Root module must be dependency-free
        run: |
          if grep -qE '^[[:space:]]*require[[:space:]]' go.mod; then
            echo "::error::root go.mod must have no require directive (zero-dep embed module)"; grep -n require go.mod; exit 1
          fi

      - name: Sanitizer gate (no private-repo leakage in vectors/docs/packages)
        run: |
          if grep -rInE 'nhp-OWNED|nhp-owned|endpoints/server/internal|endpoints/js-agent|layervai/nhp|nhp/core|\bvendored\b|vendoring' vectors/ npm/vectors/ python/qurl_conformance/_data/ README.md 2>/dev/null; then
            echo "::error::private-repo leak term found"; exit 1
          fi

      - name: Vector byte-identity (root == npm == python)
        run: bash scripts/check-sync.sh

      - name: Legacy SDK verifier shares the root Go floor
        run: |
          root_go="$(awk '$1 == "go" { print $2 }' go.mod)"
          sdk_go="$(awk '$1 == "go" { print $2 }' tools/verify-sdk/go.mod)"
          test "$sdk_go" = "$root_go"

      - name: Cross-language compat (verify-sdk via qurl-go exported API)
        run: cd tools/verify-sdk && go test ./...

      - name: Set up Go for assignment verifier
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/verify-assignment/go.mod

      - name: Assignment wire rebuild (merged qurl-go producer)
        run: cd tools/verify-assignment && go test ./...

      - name: Set up Node for npm package smoke
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: npm package smoke
        run: |
          node <<'NODE'
          const crypto = require('node:crypto');
          const c = require('./npm');
          const r = c.relayKnockVectors();
          const a = c.agentRegistrationVectors();
          const s = c.agentAssignmentVectors();
          const k = c.agentKnockApplicationVectors();
          const x = c.agentSessionControlVectors();
          const i = c.agentApiKeyIdVectors();
          const t = c.assignmentTicketVectors();
          const u = c.connectorAuthorityLambdaVectors();
          const h = c.connectorHubRequestIdVectors();
          const hc = c.connectorHubLstCookieVectors();
          const hubFrame = (tag, value) => {
            const prefix = Buffer.alloc(3);
            prefix[0] = tag;
            prefix.writeUInt16BE(value.length, 1);
            return Buffer.concat([prefix, value]);
          };
          const deriveHubRequestId = vector => {
            const peer = Buffer.from(vector.authenticated_peer_public_key_b64, 'base64');
            const nonce = Buffer.from(vector.request_nonce, 'base64url');
            const preimage = Buffer.concat([
              Buffer.from(`${h.contract.domain_ascii}\0`, 'ascii'),
              hubFrame(1, Buffer.from(vector.environment, 'ascii')),
              hubFrame(2, Buffer.from(vector.operation, 'ascii')),
              hubFrame(3, peer),
              hubFrame(4, nonce),
            ]);
            if (preimage.toString('hex') !== vector.preimage_hex) return false;
            return crypto.createHash('sha256').update(preimage).digest('hex') === vector.hub_request_id;
          };
          const hubRequestIds = new Set(h.cases.map(v => v.hub_request_id));
          const authorityRequests = Object.fromEntries(
            Object.entries(u.operations).map(([name, operation]) => [name, JSON.parse(operation.request_golden.body_json)])
          );
          const globalAuthorityOperations = ['IssueAssignment', 'RefreshAssignment'];
          const cellAuthorityOperations = ['IssueRegistrationOTP', 'ActivateRegistration', 'CompleteRegistration'];
          const activationUnavailable = u.operations.ActivateRegistration.public_mapping_cases.find(v => v.name === 'unavailable');
          const replies = Object.fromEntries(k.reply_cases.map(v => [v.name, v]));
          const requests = Object.fromEntries(k.request_cases.map(v => [v.name, v]));
          const idResponses = Object.fromEntries(i.consumer_response_cases.map(v => [v.name, v]));
          const idValuePattern = new RegExp(i.contract.pattern);
          const idValuesAgree = i.consumer_value_cases.every(
            v => idValuePattern.test(v.value) === (v.outcome === 'accept')
          );
          const canonical = '0123456789abcdef';
          const resource = 'connector-conformance-01';
          // Stock JSON parsing is intentionally insufficient for these cases:
          // duplicate keys collapse last-wins and aliases remain unchecked.
          const lossyDuplicate = JSON.parse(requests.reject_duplicate_run_id.body_json);
          const uncheckedAlias = JSON.parse(requests.reject_alias_run_id.body_json);
          const assignmentInitial = JSON.parse(s.initial_assignment.result.body_json).list;
          const assignmentRefresh = JSON.parse(s.refresh_assignment.result.body_json).list;
          const assignmentInitialRequest = JSON.parse(s.initial_assignment.request.body_json);
          const assignmentRefreshRequest = JSON.parse(s.refresh_assignment.request.body_json);
          const nonceIsCanonical32 = value => {
            const decoded = Buffer.from(value, 'base64url');
            return decoded.length === 32 && decoded.toString('base64url') === value;
          };
          const assignmentRegister = JSON.parse(s.assigned_cell_registration.request.body_json);
          const assignmentOtp = JSON.parse(s.account_credential_otp.request.body_json);
          const assignmentOtpBinding = s.account_credential_otp.enrollment_binding;
          const assignmentOtpRequests = Object.fromEntries(s.account_credential_otp.request_cases.map(v => [v.name, v]));
          const assignmentOtpBindings = Object.fromEntries(s.account_credential_otp.binding_cases.map(v => [v.name, v]));
          const assignmentOtpChallengeBindings = Object.fromEntries(s.account_credential_otp.challenge_binding_cases.map(v => [v.name, v]));
          const assignmentOtpChallengesAgree = [
            'reject_challenge_ticket_jti_mismatch',
            'reject_challenge_peer_public_key_mismatch',
            'reject_challenge_dev_id_mismatch',
            'reject_challenge_credential_key_id_mismatch',
            'reject_challenge_environment_mismatch',
            'reject_challenge_cell_mismatch',
          ].every(name => assignmentOtpChallengeBindings[name].reject_class === 'challenge_binding');
          const assignmentOtpSizes = Object.fromEntries(s.account_credential_otp.packet_size_contract.cases.map(v => [v.name, v]));
          const assignmentCompletionRequest = JSON.parse(s.registration_completion.request.body_json);
          const deviceApiKey = assignmentCompletionRequest.usrData.device_api_key;
          const deviceApiKeyPrefix = 'lv_live_';
          const deviceApiKeySecretBytes = 32;
          const deviceApiKeyBody = deviceApiKey.slice(deviceApiKeyPrefix.length);
          const deviceApiKeyBytes = Buffer.from(deviceApiKeyBody, 'base64url');
          const deviceApiKeyCanonical = deviceApiKey.startsWith(deviceApiKeyPrefix) &&
            deviceApiKeyBytes.length === deviceApiKeySecretBytes &&
            deviceApiKeyBytes.every((value, index) => value === index) &&
            deviceApiKeyBytes.toString('base64url') === deviceApiKeyBody;
          const assignmentCompletion = JSON.parse(s.registration_completion.result.body_json).list;
          const assignmentRequests = Object.fromEntries(s.request_cases.map(v => [v.name, v]));
          const nullNonce = JSON.parse(assignmentRequests.reject_null_initial_request_nonce.body_json).usrData.request_nonce;
          const standardBase64Nonce = JSON.parse(assignmentRequests.reject_standard_base64_refresh_request_nonce.body_json).usrData.request_nonce;
          const nonCanonicalTailNonce = JSON.parse(assignmentRequests.reject_noncanonical_tail_bits_refresh_request_nonce.body_json).usrData.request_nonce;
          const refreshNonceBytes = Buffer.from(assignmentRefreshRequest.usrData.request_nonce, 'base64url');
          const assignmentResults = Object.fromEntries(s.success_result_cases.map(v => [v.name, v]));
          const assignmentErrors = Object.fromEntries(s.error_contract.assignment_cases.map(v => [v.name, v]));
          const assignmentMalformed = Object.fromEntries(s.error_contract.malformed_cases.map(v => [v.name, v]));
          const sessionCookie = Buffer.from(x.overload_reknock.cookie_b64, 'base64');
          const sessionPackets = [
            x.overload_reknock.knock_request,
            x.overload_reknock.cookie_reply,
            x.overload_reknock.reknock_request,
            x.overload_reknock.ack,
            x.clean_exit.request,
            x.clean_exit.ack,
          ];
          if (!c.qv2Vectors().classes || !c.issuerSignatureVectors().issuer ||
              !r.knock.packet_hex || !r.ack.packet_hex || !a.otp.packet_hex || !a.rak_success.packet_hex ||
              s.schema_version !== 4 || s.initial_assignment.request.header_type !== 5 ||
              !nonceIsCanonical32(assignmentInitialRequest.usrData.request_nonce) ||
              !nonceIsCanonical32(assignmentRefreshRequest.usrData.request_nonce) ||
              assignmentInitialRequest.usrData.request_nonce === assignmentRefreshRequest.usrData.request_nonce ||
              JSON.stringify(s.public_registration_key_kinds) !== JSON.stringify(['bootstrap', 'connector_bootstrap', 'account', 'agent']) ||
              s.initial_assignment.result.header_type !== 6 ||
              s.initial_assignment.request.counter !== s.initial_assignment.result.counter ||
              s.assigned_cell_registration.request.header_type !== 13 ||
              s.assigned_cell_registration.result.header_type !== 14 ||
              s.assigned_cell_registration.request.counter !== s.assigned_cell_registration.result.counter ||
              s.account_credential_otp.producer_revision !== '2072546e1fc76eb76bd7e5c22d37856019ba33e7' ||
              s.account_credential_otp.raw_body_required !== true ||
              s.account_credential_otp.authenticated_peer_public_key_required !== true ||
              JSON.stringify(s.account_credential_otp.otp_registration_key_kinds) !== JSON.stringify(['account']) ||
              JSON.stringify(s.account_credential_otp.otp_free_registration_key_kinds) !== JSON.stringify(['bootstrap', 'connector_bootstrap', 'agent']) ||
              s.account_credential_otp.request.header_type !== 12 ||
              s.account_credential_otp.request.receiver_key !== 'assigned_cell' ||
              assignmentOtp.usrId !== assignmentOtpBinding.request_registration_key_id ||
              assignmentOtp.devId !== assignmentOtpBinding.request_agent_id ||
              assignmentOtp.pass !== assignmentOtpBinding.request_credential ||
              assignmentOtp.usrData.query !== 'agent_registration_otp' ||
              assignmentOtp.usrData.version !== 1 ||
              assignmentOtp.usrData.assignment_ticket !== assignmentOtpBinding.request_assignment_ticket ||
              assignmentOtpBinding.request_credential_hash_b64 !== assignmentOtpBinding.ticket_credential_key_hash_b64 ||
              assignmentOtpBinding.recomputed_credential_fence_b64 !== assignmentOtpBinding.ticket_credential_fence_b64 ||
