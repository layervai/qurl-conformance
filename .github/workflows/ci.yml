              assignmentCompletionRequest.usrData.assignment_ticket !== undefined ||
              JSON.stringify(Object.keys(assignmentCompletion).sort()) !== JSON.stringify(['device_api_key_id', 'query', 'version']) ||
              s.request_cases.length !== 30 ||
