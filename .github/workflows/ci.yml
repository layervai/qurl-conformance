              assignmentOtpRequests.reject_trailing_otp_value.reject_class !== 'body_parse' ||
              assignmentOtpRequests.reject_wrong_otp_header_phase.reject_class !== 'wrong_phase' ||
              s.account_credential_otp.binding_cases.length !== 13 ||
              assignmentOtpBindings.accept_exact_minimum_lifetime.outcome !== 'accept' ||
              assignmentOtpBindings.reject_different_request_ticket.reject_class !== 'ticket_binding' ||
