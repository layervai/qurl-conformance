name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conformance:
    name: vectors + go + cross-language
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Root module — test/vet/fmt
        run: |
          # go.mod names an exact patch floor; this equality proves setup-go did
          # not float the consumer-compatibility lane to a newer 1.26.x patch.
          test "$(go env GOVERSION)" = "go1.26.4"
          go test ./...
          go vet ./...
          if [ -n "$(gofmt -l .)" ]; then echo "::error::gofmt"; gofmt -l .; exit 1; fi

      - name: Root module must be dependency-free
        run: |
          if grep -qE '^[[:space:]]*require[[:space:]]' go.mod; then
            echo "::error::root go.mod must have no require directive (zero-dep embed module)"; grep -n require go.mod; exit 1
          fi

      - name: Sanitizer gate (no private-repo leakage in vectors/docs/packages)
        run: |
          if grep -rInE 'nhp-OWNED|nhp-owned|endpoints/server/internal|endpoints/js-agent|layervai/nhp|nhp/core|\bvendored\b|vendoring' vectors/ npm/vectors/ python/qurl_conformance/_data/ README.md 2>/dev/null; then
            echo "::error::private-repo leak term found"; exit 1
          fi

      - name: Vector byte-identity (root == npm == python)
        run: bash scripts/check-sync.sh

      - name: Set up Go for verifier modules
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.5
          check-latest: true

      - name: Cross-language compat (verify-sdk via qurl-go exported API)
        run: cd tools/verify-sdk && go test ./...

      - name: Assignment wire rebuild (merged qurl-go producer)
        run: cd tools/verify-assignment && go test ./...

      - name: npm package smoke
        run: |
          node <<'NODE'
          const c = require('./npm');
          const r = c.relayKnockVectors();
          const a = c.agentRegistrationVectors();
          const s = c.agentAssignmentVectors();
          const k = c.agentKnockApplicationVectors();
          const i = c.agentApiKeyIdVectors();
          const replies = Object.fromEntries(k.reply_cases.map(v => [v.name, v]));
          const requests = Object.fromEntries(k.request_cases.map(v => [v.name, v]));
          const idResponses = Object.fromEntries(i.consumer_response_cases.map(v => [v.name, v]));
          const idValuePattern = new RegExp(i.contract.pattern);
          const idValuesAgree = i.consumer_value_cases.every(
            v => idValuePattern.test(v.value) === (v.outcome === 'accept')
          );
          const canonical = '0123456789abcdef';
          const resource = 'connector-conformance-01';
          // Stock JSON parsing is intentionally insufficient for these cases:
          // duplicate keys collapse last-wins and aliases remain unchecked.
          const lossyDuplicate = JSON.parse(requests.reject_duplicate_run_id.body_json);
          const uncheckedAlias = JSON.parse(requests.reject_alias_run_id.body_json);
          const assignmentInitial = JSON.parse(s.initial_assignment.result.body_json).list;
          const assignmentRefresh = JSON.parse(s.refresh_assignment.result.body_json).list;
          const assignmentRegister = JSON.parse(s.assigned_cell_registration.request.body_json);
          const assignmentCompletion = JSON.parse(s.registration_completion.result.body_json).list;
          const assignmentRequests = Object.fromEntries(s.request_cases.map(v => [v.name, v]));
          const assignmentResults = Object.fromEntries(s.success_result_cases.map(v => [v.name, v]));
          const assignmentMalformed = Object.fromEntries(s.error_contract.malformed_cases.map(v => [v.name, v]));
          if (!c.qv2Vectors().classes || !c.issuerSignatureVectors().issuer ||
              !r.knock.packet_hex || !r.ack.packet_hex || !a.otp.packet_hex || !a.rak_success.packet_hex ||
              s.schema_version !== 1 || s.initial_assignment.request.header_type !== 5 ||
              JSON.stringify(s.public_registration_key_kinds) !== JSON.stringify(['bootstrap', 'connector_bootstrap', 'account', 'agent']) ||
              s.initial_assignment.result.header_type !== 6 ||
              s.initial_assignment.request.counter !== s.initial_assignment.result.counter ||
              s.assigned_cell_registration.request.header_type !== 13 ||
              s.assigned_cell_registration.result.header_type !== 14 ||
              s.assigned_cell_registration.request.counter !== s.assigned_cell_registration.result.counter ||
              assignmentRegister.usrData.assignment_ticket !== assignmentInitial.assignment_ticket ||
              assignmentRegister.otp !== JSON.parse(s.initial_assignment.request.body_json).usrData.credential ||
              assignmentInitial.registration.masked_email !== undefined ||
              assignmentRefresh.assignment_ticket !== undefined ||
              assignmentRefresh.assignment_ticket_expires_at !== undefined ||
              s.registration_completion.request.receiver_key !== 'assigned_cell' ||
              JSON.parse(s.registration_completion.request.body_json).usrData.assignment_ticket !== undefined ||
              JSON.stringify(Object.keys(assignmentCompletion).sort()) !== JSON.stringify(['device_api_key_id', 'query', 'version']) ||
              s.request_cases.length !== 21 ||
              assignmentRequests.reject_duplicate_outer_dev_id.reject_class !== 'body_parse' ||
              assignmentRequests.reject_alias_outer_dev_id.reject_class !== 'unknown_field' ||
              assignmentRequests.reject_client_public_key.reject_class !== 'unknown_field' ||
              assignmentRequests.reject_refresh_assignment_ticket.reject_class !== 'unknown_field' ||
              assignmentRequests.reject_duplicate_registration_ticket.reject_class !== 'body_parse' ||
              assignmentRequests.reject_wrong_mode.reject_class !== 'semantic' ||
              s.success_result_cases.length !== 12 ||
              assignmentResults.reject_initial_private_key_kind.reject_class !== 'semantic' ||
              JSON.parse(assignmentResults.reject_initial_private_key_kind.body_json).list.registration.key_kind !== 'tunnel_bootstrap' ||
              assignmentResults.reject_initial_unknown_key_kind.reject_class !== 'semantic' ||
              JSON.parse(assignmentResults.reject_initial_unknown_key_kind.body_json).list.registration.key_kind !== 'future_kind' ||
              assignmentResults.reject_refresh_result_assignment_ticket.reject_class !== 'unknown_field' ||
              assignmentResults.reject_completion_device_api_key.reject_class !== 'unknown_field' ||
              assignmentResults.reject_completion_device_api_key_hash.reject_class !== 'unknown_field' ||
              assignmentResults.reject_completion_device_key_commitment.reject_class !== 'unknown_field' ||
              s.error_contract.status !== 'ready' || s.error_contract.producer_revision !== '9653fcb185c77629b787ad046c13c760baba88f4' ||
              assignmentMalformed.reject_unknown_list_error_code.reject_class !== 'unknown_error_code' ||
              assignmentMalformed.reject_unknown_registration_error_code.reject_class !== 'unknown_error_code' ||
              s.error_contract.assignment_cases.length !== 6 ||
              s.error_contract.initial_credential_cases.length !== 4 ||
              s.error_contract.completion_cases.length !== 5 ||
              s.error_contract.registration_cases.length !== 4 ||
              s.error_contract.rules.cookie_challenge_allowed !== false ||
              k.schema_version !== 3 || k.request.fields.run_id !== canonical ||
              JSON.parse(k.request.body_json).runId !== canonical || k.request_cases.length !== 12 ||
              requests.canonical_run_id.native_connector.parsed_run_id !== canonical ||
              requests.missing_run_id.generic_parser.parsed_run_id !== '' ||
              requests.missing_run_id.native_connector.reject_class !== 'missing_run_id' ||
              requests.reject_uppercase_run_id.generic_parser.reject_class !== 'invalid_run_id' ||
              requests.reject_alias_run_id.native_connector.reject_class !== 'body_parse' ||
              lossyDuplicate.runId !== 'fedcba9876543210' ||
              uncheckedAlias.runID !== canonical || uncheckedAlias.runId !== undefined ||
              k.reply_cases.length !== 25 || replies.ack_success.outcome !== 'success' ||
              JSON.parse(replies.ack_success.body_json).preActions[resource] !== null ||
              replies.ack_success.expected_ac_token !== JSON.parse(replies.ack_success.body_json).acTokens[resource] ||
              replies.ack_success.expected_resource_host !== JSON.parse(replies.ack_success.body_json).resHost[resource] ||
              JSON.parse(replies.ack_success_optional_metadata.body_json).aspToken === replies.ack_success_optional_metadata.expected_ac_token ||
              replies.reject_pre_access_action_requested.reject_class !== 'unsupported_pre_access' ||
              replies.reject_pre_access_action_other_resource.reject_class !== 'unsupported_pre_access' ||
              !Array.isArray(JSON.parse(replies.reject_malformed_pre_actions.body_json).preActions) ||
              replies.reject_malformed_pre_actions.reject_class !== 'body_parse' ||
              replies.ack_deny.reject_class !== 'server_deny' ||
              replies.reject_counter_mismatch.request_counter === replies.reject_counter_mismatch.reply_counter ||
              JSON.parse(replies.reject_malformed_opn_time.body_json).opnTime !== '900' ||
              replies.reject_malformed_opn_time.reject_class !== 'body_parse' ||
              JSON.parse(replies.reject_malformed_agent_addr.body_json).agentAddr !== 7 ||
              replies.reject_malformed_agent_addr.reject_class !== 'body_parse' ||
              !Array.isArray(JSON.parse(replies.reject_malformed_ac_tokens_map.body_json).acTokens) ||
              replies.reject_malformed_ac_tokens_map.reject_class !== 'body_parse' ||
              i.schema_version !== 1 || i.contract.pattern !== '^key_[A-Za-z0-9]{12}$' ||
              i.producer_cases.length !== 4 || i.consumer_value_cases.length !== 18 ||
              i.consumer_response_cases.length !== 26 ||
              !idValuesAgree ||
              idResponses.registration_info_accept_canonical.expected_id !== 'key_A1b2C3d4E5f6' ||
              idResponses.registration_info_accept_with_companion_field.expected_id !== 'key_A1b2C3d4E5f6' ||
              idResponses.completion_reject_duplicate_field.reject_class !== 'body_parse') {
            process.exit(1);
          }
          console.log('npm ok');
          NODE

      - name: python package smoke
        run: |
          cd python
          python3 <<'PY'
          import json
          import re
          import sys
          sys.path.insert(0, '.')
          import qurl_conformance as q

          r = q.relay_knock_vectors()
          a = q.agent_registration_vectors()
          s = q.agent_assignment_vectors()
          k = q.agent_knock_application_vectors()
          i = q.agent_api_key_id_vectors()
          replies = {v['name']: v for v in k['reply_cases']}
          requests = {v['name']: v for v in k['request_cases']}
          id_responses = {v['name']: v for v in i['consumer_response_cases']}
          canonical = '0123456789abcdef'
          resource = 'connector-conformance-01'
          # Stock JSON parsing is intentionally insufficient for these cases:
          # duplicate keys collapse last-wins and aliases remain unchecked.
          lossy_duplicate = json.loads(requests['reject_duplicate_run_id']['body_json'])
          unchecked_alias = json.loads(requests['reject_alias_run_id']['body_json'])
          assert q.qv2_vectors()['classes'] and q.issuer_signature_vectors()['issuer']
          assert r['knock']['packet_hex'] and r['ack']['packet_hex']
          assert a['otp']['packet_hex'] and a['rak_success']['packet_hex']
          assert s['schema_version'] == 1
          assert s['public_registration_key_kinds'] == ['bootstrap', 'connector_bootstrap', 'account', 'agent']
          assert s['initial_assignment']['request']['header_type'] == 5
          assert s['initial_assignment']['result']['header_type'] == 6
          assert s['initial_assignment']['request']['counter'] == s['initial_assignment']['result']['counter']
          initial_assignment = json.loads(s['initial_assignment']['result']['body_json'])['list']
          refresh_assignment = json.loads(s['refresh_assignment']['result']['body_json'])['list']
          registration = json.loads(s['assigned_cell_registration']['request']['body_json'])
          completion = json.loads(s['registration_completion']['result']['body_json'])['list']
          assignment_requests = {v['name']: v for v in s['request_cases']}
          assignment_results = {v['name']: v for v in s['success_result_cases']}
          assignment_malformed = {v['name']: v for v in s['error_contract']['malformed_cases']}
          assert s['assigned_cell_registration']['request']['header_type'] == 13
          assert s['assigned_cell_registration']['result']['header_type'] == 14
          assert s['assigned_cell_registration']['request']['counter'] == s['assigned_cell_registration']['result']['counter']
          assert registration['usrData']['assignment_ticket'] == initial_assignment['assignment_ticket']
          assert registration['otp'] == json.loads(s['initial_assignment']['request']['body_json'])['usrData']['credential']
          assert 'masked_email' not in initial_assignment['registration']
          assert 'assignment_ticket' not in refresh_assignment
          assert 'assignment_ticket_expires_at' not in refresh_assignment
          assert s['registration_completion']['request']['receiver_key'] == 'assigned_cell'
          assert 'assignment_ticket' not in json.loads(s['registration_completion']['request']['body_json'])['usrData']
          assert set(completion) == {'query', 'version', 'device_api_key_id'}
          assert len(s['request_cases']) == 21
          assert assignment_requests['reject_duplicate_outer_dev_id']['reject_class'] == 'body_parse'
          assert assignment_requests['reject_alias_outer_dev_id']['reject_class'] == 'unknown_field'
          assert assignment_requests['reject_client_public_key']['reject_class'] == 'unknown_field'
          assert assignment_requests['reject_refresh_assignment_ticket']['reject_class'] == 'unknown_field'
          assert assignment_requests['reject_duplicate_registration_ticket']['reject_class'] == 'body_parse'
          assert assignment_requests['reject_wrong_mode']['reject_class'] == 'semantic'
          assert len(s['success_result_cases']) == 12
          assert assignment_results['reject_initial_private_key_kind']['reject_class'] == 'semantic'
          assert json.loads(assignment_results['reject_initial_private_key_kind']['body_json'])['list']['registration']['key_kind'] == 'tunnel_bootstrap'
          assert assignment_results['reject_initial_unknown_key_kind']['reject_class'] == 'semantic'
          assert json.loads(assignment_results['reject_initial_unknown_key_kind']['body_json'])['list']['registration']['key_kind'] == 'future_kind'
          assert assignment_results['reject_refresh_result_assignment_ticket']['reject_class'] == 'unknown_field'
          assert assignment_results['reject_completion_device_api_key']['reject_class'] == 'unknown_field'
          assert assignment_results['reject_completion_device_api_key_hash']['reject_class'] == 'unknown_field'
          assert assignment_results['reject_completion_device_key_commitment']['reject_class'] == 'unknown_field'
          assert s['error_contract']['status'] == 'ready'
          assert s['error_contract']['producer_revision'] == '9653fcb185c77629b787ad046c13c760baba88f4'
          assert assignment_malformed['reject_unknown_list_error_code']['reject_class'] == 'unknown_error_code'
          assert assignment_malformed['reject_unknown_registration_error_code']['reject_class'] == 'unknown_error_code'
          assert len(s['error_contract']['assignment_cases']) == 6
          assert len(s['error_contract']['initial_credential_cases']) == 4
          assert len(s['error_contract']['completion_cases']) == 5
          assert len(s['error_contract']['registration_cases']) == 4
          assert s['error_contract']['rules']['cookie_challenge_allowed'] is False
          assert k['schema_version'] == 3 and k['request']['fields']['run_id'] == canonical
          assert json.loads(k['request']['body_json'])['runId'] == canonical
          assert len(k['request_cases']) == 12
          assert requests['canonical_run_id']['native_connector']['parsed_run_id'] == canonical
          assert requests['missing_run_id']['generic_parser']['parsed_run_id'] == ''
          assert requests['missing_run_id']['native_connector']['reject_class'] == 'missing_run_id'
          assert requests['reject_uppercase_run_id']['generic_parser']['reject_class'] == 'invalid_run_id'
          assert requests['reject_alias_run_id']['native_connector']['reject_class'] == 'body_parse'
          assert lossy_duplicate['runId'] == 'fedcba9876543210'
          assert unchecked_alias['runID'] == canonical and 'runId' not in unchecked_alias
          assert len(k['reply_cases']) == 25 and replies['ack_success']['outcome'] == 'success'
          success = json.loads(replies['ack_success']['body_json'])
          optional = json.loads(replies['ack_success_optional_metadata']['body_json'])
          assert success['preActions'][resource] is None
          assert replies['ack_success']['expected_ac_token'] == success['acTokens'][resource]
          assert replies['ack_success']['expected_resource_host'] == success['resHost'][resource]
          assert optional['aspToken'] != replies['ack_success_optional_metadata']['expected_ac_token']
          assert replies['reject_pre_access_action_requested']['reject_class'] == 'unsupported_pre_access'
          assert replies['reject_pre_access_action_other_resource']['reject_class'] == 'unsupported_pre_access'
          assert isinstance(json.loads(replies['reject_malformed_pre_actions']['body_json'])['preActions'], list)
          assert replies['reject_malformed_pre_actions']['reject_class'] == 'body_parse'
          assert replies['ack_deny']['reject_class'] == 'server_deny'
          assert replies['reject_counter_mismatch']['request_counter'] != replies['reject_counter_mismatch']['reply_counter']
          assert json.loads(replies['reject_malformed_opn_time']['body_json'])['opnTime'] == '900'
          assert replies['reject_malformed_opn_time']['reject_class'] == 'body_parse'
          assert json.loads(replies['reject_malformed_agent_addr']['body_json'])['agentAddr'] == 7
          assert replies['reject_malformed_agent_addr']['reject_class'] == 'body_parse'
          assert isinstance(json.loads(replies['reject_malformed_ac_tokens_map']['body_json'])['acTokens'], list)
          assert replies['reject_malformed_ac_tokens_map']['reject_class'] == 'body_parse'
          assert i['schema_version'] == 1 and i['contract']['pattern'] == r'^key_[A-Za-z0-9]{12}$'
          assert len(i['producer_cases']) == 4 and len(i['consumer_value_cases']) == 18
          assert len(i['consumer_response_cases']) == 26
          assert all(
              (re.fullmatch(i['contract']['pattern'], v['value']) is not None) == (v['outcome'] == 'accept')
              for v in i['consumer_value_cases']
          )
          assert id_responses['registration_info_accept_canonical']['expected_id'] == 'key_A1b2C3d4E5f6'
          assert id_responses['registration_info_accept_with_companion_field']['expected_id'] == 'key_A1b2C3d4E5f6'
          assert id_responses['completion_reject_duplicate_field']['reject_class'] == 'body_parse'
          print('py ok')
          PY

  # Slack build-completion card. Thin shim over the fleet-shared reusable in
  # layervai/ops-routines-workflows (public mirror of private
  # layervai/ops-routines); the Block Kit payload builder and gate-result
  # aggregation live there. Adding/removing a gate is a one-line edit to
  # `needs:` + `gates:` here.
  notify:
    name: Notify
    needs: [conformance]
    # `!cancelled()` rather than `always()`: this repo sets
    # concurrency.cancel-in-progress, so a newer push to main cancels the
    # in-flight run. `always()` would still post a yellow "cancelled" card for
    # every superseded push. We notify on success and failure; we stay quiet
    # only when the run is cancelled out from under us. Skipped on PRs.
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    permissions: {}
    uses: layervai/ops-routines-workflows/.github/workflows/notify.yml@1536c698add5777aa08c781bc674d1eba469b32d # v0.9.0
    with:
      header: "qURL Conformance Build"
      gates: '{"Conformance": "${{ needs.conformance.result }}"}'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
