name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  conformance:
    name: vectors + go + cross-language
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Root module — test/vet/fmt
        run: |
          # go.mod is the root compatibility source of truth. This equality
          # proves setup-go selected its exact patch rather than floating 1.26.x.
          # It deliberately assumes go.mod has no toolchain directive.
          expected_go="go$(awk '$1 == "go" { print $2 }' go.mod)"
          test "$(go env GOVERSION)" = "$expected_go"
          go test ./...
          go vet ./...
          if [ -n "$(gofmt -l .)" ]; then echo "::error::gofmt"; gofmt -l .; exit 1; fi

      - name: Root module must be dependency-free
        run: |
          if grep -qE '^[[:space:]]*require[[:space:]]' go.mod; then
            echo "::error::root go.mod must have no require directive (zero-dep embed module)"; grep -n require go.mod; exit 1
          fi

      - name: Sanitizer gate (no private-repo leakage in vectors/docs/packages)
        run: |
          if grep -rInE 'nhp-OWNED|nhp-owned|endpoints/server/internal|endpoints/js-agent|layervai/nhp|nhp/core|\bvendored\b|vendoring' vectors/ npm/vectors/ python/qurl_conformance/_data/ README.md 2>/dev/null; then
            echo "::error::private-repo leak term found"; exit 1
          fi

      - name: Vector byte-identity (root == npm == python)
        run: bash scripts/check-sync.sh

      - name: Legacy SDK verifier shares the root Go floor
        run: |
          root_go="$(awk '$1 == "go" { print $2 }' go.mod)"
          sdk_go="$(awk '$1 == "go" { print $2 }' tools/verify-sdk/go.mod)"
          test "$sdk_go" = "$root_go"

      - name: Cross-language compat (verify-sdk via qurl-go exported API)
        run: cd tools/verify-sdk && go test ./...

      - name: Set up Go for assignment verifier
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/verify-assignment/go.mod

      - name: Assignment wire rebuild (merged qurl-go producer)
        run: cd tools/verify-assignment && go test ./...

      - name: Set up Node for npm package smoke
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: npm package smoke
        run: |
          node <<'NODE'
          const c = require('./npm');
          const r = c.relayKnockVectors();
          const a = c.agentRegistrationVectors();
          const s = c.agentAssignmentVectors();
          const k = c.agentKnockApplicationVectors();
          const i = c.agentApiKeyIdVectors();
          const t = c.assignmentTicketVectors();
          const replies = Object.fromEntries(k.reply_cases.map(v => [v.name, v]));
          const requests = Object.fromEntries(k.request_cases.map(v => [v.name, v]));
          const idResponses = Object.fromEntries(i.consumer_response_cases.map(v => [v.name, v]));
          const idValuePattern = new RegExp(i.contract.pattern);
          const idValuesAgree = i.consumer_value_cases.every(
            v => idValuePattern.test(v.value) === (v.outcome === 'accept')
          );
          const canonical = '0123456789abcdef';
          const resource = 'connector-conformance-01';
          // Stock JSON parsing is intentionally insufficient for these cases:
          // duplicate keys collapse last-wins and aliases remain unchecked.
          const lossyDuplicate = JSON.parse(requests.reject_duplicate_run_id.body_json);
          const uncheckedAlias = JSON.parse(requests.reject_alias_run_id.body_json);
          const assignmentInitial = JSON.parse(s.initial_assignment.result.body_json).list;
          const assignmentRefresh = JSON.parse(s.refresh_assignment.result.body_json).list;
          const assignmentRegister = JSON.parse(s.assigned_cell_registration.request.body_json);
          const assignmentOtp = JSON.parse(s.account_credential_otp.request.body_json);
          const assignmentOtpBinding = s.account_credential_otp.enrollment_binding;
          const assignmentOtpRequests = Object.fromEntries(s.account_credential_otp.request_cases.map(v => [v.name, v]));
          const assignmentOtpBindings = Object.fromEntries(s.account_credential_otp.binding_cases.map(v => [v.name, v]));
          const assignmentOtpChallengeBindings = Object.fromEntries(s.account_credential_otp.challenge_binding_cases.map(v => [v.name, v]));
          const assignmentOtpChallengesAgree = [
            'reject_challenge_ticket_jti_mismatch',
            'reject_challenge_peer_public_key_mismatch',
            'reject_challenge_dev_id_mismatch',
            'reject_challenge_credential_key_id_mismatch',
            'reject_challenge_environment_mismatch',
            'reject_challenge_cell_mismatch',
          ].every(name => assignmentOtpChallengeBindings[name].reject_class === 'challenge_binding');
          const assignmentOtpSizes = Object.fromEntries(s.account_credential_otp.packet_size_contract.cases.map(v => [v.name, v]));
          const assignmentCompletionRequest = JSON.parse(s.registration_completion.request.body_json);
          const deviceApiKey = assignmentCompletionRequest.usrData.device_api_key;
          const deviceApiKeyPrefix = 'lv_live_';
          const deviceApiKeySecretBytes = 32;
          const deviceApiKeyBody = deviceApiKey.slice(deviceApiKeyPrefix.length);
          const deviceApiKeyBytes = Buffer.from(deviceApiKeyBody, 'base64url');
          const deviceApiKeyCanonical = deviceApiKey.startsWith(deviceApiKeyPrefix) &&
            deviceApiKeyBytes.length === deviceApiKeySecretBytes &&
            deviceApiKeyBytes.every((value, index) => value === index) &&
            deviceApiKeyBytes.toString('base64url') === deviceApiKeyBody;
          const assignmentCompletion = JSON.parse(s.registration_completion.result.body_json).list;
          const assignmentRequests = Object.fromEntries(s.request_cases.map(v => [v.name, v]));
          const assignmentResults = Object.fromEntries(s.success_result_cases.map(v => [v.name, v]));
          const assignmentMalformed = Object.fromEntries(s.error_contract.malformed_cases.map(v => [v.name, v]));
          if (!c.qv2Vectors().classes || !c.issuerSignatureVectors().issuer ||
              !r.knock.packet_hex || !r.ack.packet_hex || !a.otp.packet_hex || !a.rak_success.packet_hex ||
              s.schema_version !== 2 || s.initial_assignment.request.header_type !== 5 ||
              JSON.stringify(s.public_registration_key_kinds) !== JSON.stringify(['bootstrap', 'connector_bootstrap', 'account', 'agent']) ||
              s.initial_assignment.result.header_type !== 6 ||
              s.initial_assignment.request.counter !== s.initial_assignment.result.counter ||
              s.assigned_cell_registration.request.header_type !== 13 ||
              s.assigned_cell_registration.result.header_type !== 14 ||
              s.assigned_cell_registration.request.counter !== s.assigned_cell_registration.result.counter ||
              s.account_credential_otp.producer_revision !== '2072546e1fc76eb76bd7e5c22d37856019ba33e7' ||
              s.account_credential_otp.raw_body_required !== true ||
              s.account_credential_otp.authenticated_peer_public_key_required !== true ||
              JSON.stringify(s.account_credential_otp.otp_registration_key_kinds) !== JSON.stringify(['account']) ||
              JSON.stringify(s.account_credential_otp.otp_free_registration_key_kinds) !== JSON.stringify(['bootstrap', 'connector_bootstrap', 'agent']) ||
              s.account_credential_otp.request.header_type !== 12 ||
              s.account_credential_otp.request.receiver_key !== 'assigned_cell' ||
              assignmentOtp.usrId !== assignmentOtpBinding.request_registration_key_id ||
              assignmentOtp.devId !== assignmentOtpBinding.request_agent_id ||
              assignmentOtp.pass !== assignmentOtpBinding.request_credential ||
              assignmentOtp.usrData.query !== 'agent_registration_otp' ||
              assignmentOtp.usrData.version !== 1 ||
              assignmentOtp.usrData.assignment_ticket !== assignmentOtpBinding.request_assignment_ticket ||
              assignmentOtpBinding.request_credential_hash_b64 !== assignmentOtpBinding.ticket_credential_key_hash_b64 ||
              assignmentOtpBinding.recomputed_credential_fence_b64 !== assignmentOtpBinding.ticket_credential_fence_b64 ||
              s.account_credential_otp.challenge_binding.lookup_key_field !== 'ticket_jti' ||
              JSON.stringify(s.account_credential_otp.challenge_binding.required_match_fields) !== JSON.stringify(['ticket_jti', 'authenticated_peer_public_key_b64', 'dev_id', 'credential_key_id', 'environment_id', 'cell_id']) ||
              s.account_credential_otp.challenge_binding.ticket_jti !== assignmentOtpBinding.ticket_jti ||
              s.account_credential_otp.challenge_binding.authenticated_peer_public_key_b64 !== assignmentOtpBinding.authenticated_peer_public_key_b64 ||
              s.account_credential_otp.challenge_binding.dev_id !== assignmentOtpBinding.request_agent_id ||
              s.account_credential_otp.challenge_binding.credential_key_id !== assignmentOtpBinding.request_registration_key_id ||
              s.account_credential_otp.challenge_binding.environment_id !== assignmentOtpBinding.local_environment_id ||
              s.account_credential_otp.challenge_binding.cell_id !== assignmentOtpBinding.local_cell_id ||
              assignmentOtp.pubKey !== undefined ||
              assignmentOtpBinding.ticket_expires_at_unix - assignmentOtpBinding.evaluated_at_unix !== 630 ||
              assignmentOtpBinding.minimum_ticket_remaining_seconds !== 630 ||
              s.account_credential_otp.request_cases.length !== 17 ||
              assignmentOtpRequests.reject_duplicate_otp_assignment_ticket.reject_class !== 'body_parse' ||
              assignmentOtpRequests.reject_empty_otp_usr_id.reject_class !== 'semantic' ||
              assignmentOtpRequests.reject_empty_otp_dev_id.reject_class !== 'semantic' ||
              assignmentOtpRequests.reject_wrong_otp_asp_id.reject_class !== 'semantic' ||
              assignmentOtpRequests.reject_unknown_otp_outer_field.reject_class !== 'unknown_field' ||
              assignmentOtpRequests.reject_null_otp_body.reject_class !== 'wrong_type' ||
              assignmentOtpRequests.reject_trailing_otp_value.reject_class !== 'body_parse' ||
              assignmentOtpRequests.reject_wrong_otp_header_phase.reject_class !== 'wrong_phase' ||
              s.account_credential_otp.binding_cases.length !== 13 ||
              assignmentOtpBindings.accept_exact_minimum_lifetime.outcome !== 'accept' ||
              assignmentOtpBindings.reject_different_request_ticket.reject_class !== 'ticket_binding' ||
              assignmentOtpBindings.reject_peer_public_key_mismatch.reject_class !== 'peer_binding' ||
              assignmentOtpBindings.reject_ticket_credential_key_hash_mismatch.reject_class !== 'credential_binding' ||
              assignmentOtpBindings.reject_ticket_credential_fence_mismatch.reject_class !== 'credential_binding' ||
              assignmentOtpBindings.reject_ticket_remaining_lifetime_629.reject_class !== 'ticket_lifetime' ||
              s.account_credential_otp.challenge_binding_cases.length !== 7 ||
              assignmentOtpChallengeBindings.accept_exact_challenge_binding.outcome !== 'accept' ||
              !assignmentOtpChallengesAgree ||
              s.account_credential_otp.packet_size_contract.cases.length !== 2 ||
              s.account_credential_otp.packet_size_contract.max_plaintext_body_bytes !== 3840 ||
              s.account_credential_otp.packet_size_contract.max_packet_bytes !== 4096 ||
              assignmentOtpSizes.accept_max_plaintext_body.expected_packet_bytes !== 4096 ||
              assignmentOtpSizes.reject_plaintext_body_over_max.reject_class !== 'packet_size' ||
              assignmentRegister.usrData.assignment_ticket !== assignmentInitial.assignment_ticket ||
              assignmentRegister.otp !== JSON.parse(s.initial_assignment.request.body_json).usrData.credential ||
              assignmentInitial.registration.masked_email !== undefined ||
              assignmentRefresh.assignment_ticket !== undefined ||
              assignmentRefresh.assignment_ticket_expires_at !== undefined ||
              s.registration_completion.request.receiver_key !== 'assigned_cell' ||
              assignmentCompletionRequest.usrData.assignment_ticket !== undefined ||
              JSON.stringify(Object.keys(assignmentCompletion).sort()) !== JSON.stringify(['device_api_key_id', 'query', 'version']) ||
              s.request_cases.length !== 21 ||
              assignmentRequests.reject_duplicate_outer_dev_id.reject_class !== 'body_parse' ||
              assignmentRequests.reject_alias_outer_dev_id.reject_class !== 'unknown_field' ||
              assignmentRequests.reject_client_public_key.reject_class !== 'unknown_field' ||
              assignmentRequests.reject_refresh_assignment_ticket.reject_class !== 'unknown_field' ||
              assignmentRequests.reject_duplicate_registration_ticket.reject_class !== 'body_parse' ||
              assignmentRequests.reject_wrong_mode.reject_class !== 'semantic' ||
              s.success_result_cases.length !== 12 ||
              assignmentResults.reject_initial_private_key_kind.reject_class !== 'semantic' ||
              JSON.parse(assignmentResults.reject_initial_private_key_kind.body_json).list.registration.key_kind !== 'tunnel_bootstrap' ||
              assignmentResults.reject_initial_unknown_key_kind.reject_class !== 'semantic' ||
              JSON.parse(assignmentResults.reject_initial_unknown_key_kind.body_json).list.registration.key_kind !== 'future_kind' ||
              assignmentResults.reject_refresh_result_assignment_ticket.reject_class !== 'unknown_field' ||
              assignmentResults.reject_completion_device_api_key.reject_class !== 'unknown_field' ||
              assignmentResults.reject_completion_device_api_key_hash.reject_class !== 'unknown_field' ||
              assignmentResults.reject_completion_device_key_commitment.reject_class !== 'unknown_field' ||
              s.error_contract.status !== 'ready' || s.error_contract.producer_revision !== '9653fcb185c77629b787ad046c13c760baba88f4' ||
              assignmentMalformed.reject_unknown_list_error_code.reject_class !== 'unknown_error_code' ||
              assignmentMalformed.reject_unknown_registration_error_code.reject_class !== 'unknown_error_code' ||
              s.error_contract.assignment_cases.length !== 6 ||
              s.error_contract.initial_credential_cases.length !== 4 ||
              s.error_contract.completion_cases.length !== 5 ||
              s.error_contract.registration_cases.length !== 4 ||
              s.error_contract.rules.cookie_challenge_allowed !== false ||
              k.schema_version !== 3 || k.request.fields.run_id !== canonical ||
              JSON.parse(k.request.body_json).runId !== canonical || k.request_cases.length !== 12 ||
              requests.canonical_run_id.native_connector.parsed_run_id !== canonical ||
              requests.missing_run_id.generic_parser.parsed_run_id !== '' ||
              requests.missing_run_id.native_connector.reject_class !== 'missing_run_id' ||
              requests.reject_uppercase_run_id.generic_parser.reject_class !== 'invalid_run_id' ||
              requests.reject_alias_run_id.native_connector.reject_class !== 'body_parse' ||
              lossyDuplicate.runId !== 'fedcba9876543210' ||
              uncheckedAlias.runID !== canonical || uncheckedAlias.runId !== undefined ||
              k.reply_cases.length !== 25 || replies.ack_success.outcome !== 'success' ||
              JSON.parse(replies.ack_success.body_json).preActions[resource] !== null ||
              replies.ack_success.expected_ac_token !== JSON.parse(replies.ack_success.body_json).acTokens[resource] ||
              replies.ack_success.expected_resource_host !== JSON.parse(replies.ack_success.body_json).resHost[resource] ||
              JSON.parse(replies.ack_success_optional_metadata.body_json).aspToken === replies.ack_success_optional_metadata.expected_ac_token ||
              replies.reject_pre_access_action_requested.reject_class !== 'unsupported_pre_access' ||
              replies.reject_pre_access_action_other_resource.reject_class !== 'unsupported_pre_access' ||
              !Array.isArray(JSON.parse(replies.reject_malformed_pre_actions.body_json).preActions) ||
              replies.reject_malformed_pre_actions.reject_class !== 'body_parse' ||
              replies.ack_deny.reject_class !== 'server_deny' ||
              replies.reject_counter_mismatch.request_counter === replies.reject_counter_mismatch.reply_counter ||
              JSON.parse(replies.reject_malformed_opn_time.body_json).opnTime !== '900' ||
              replies.reject_malformed_opn_time.reject_class !== 'body_parse' ||
              JSON.parse(replies.reject_malformed_agent_addr.body_json).agentAddr !== 7 ||
              replies.reject_malformed_agent_addr.reject_class !== 'body_parse' ||
              !Array.isArray(JSON.parse(replies.reject_malformed_ac_tokens_map.body_json).acTokens) ||
              replies.reject_malformed_ac_tokens_map.reject_class !== 'body_parse' ||
              i.schema_version !== 1 || i.contract.pattern !== '^key_[A-Za-z0-9]{12}$' ||
              i.producer_cases.length !== 4 || i.consumer_value_cases.length !== 18 ||
              i.consumer_response_cases.length !== 26 ||
              !idValuesAgree ||
              idResponses.registration_info_accept_canonical.expected_id !== 'key_A1b2C3d4E5f6' ||
              idResponses.registration_info_accept_with_companion_field.expected_id !== 'key_A1b2C3d4E5f6' ||
              idResponses.completion_reject_duplicate_field.reject_class !== 'body_parse' ||
              t.artifact !== 'qurl-assignment-ticket-v1-vectors' || t.schema_version !== 1 ||
              t.golden.token.split('.').length !== 3 || t.golden.signature_b64url.length !== 86 ||
              t.golden.lrt_body_bytes > t.contract.nhp_body_max_bytes ||
              t.golden.complete_nhp_packet_bytes > t.contract.nhp_packet_max_bytes ||
              t.contract.credential_kinds.includes('tunnel_bootstrap') ||
              !deviceApiKeyCanonical) {
            process.exit(1);
          }
          console.log('npm ok');
          NODE

      - name: Set up Python for package smoke
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: python package smoke
        run: |
          cd python
          python3 <<'PY'
          import base64
          import json
          import re
          import sys
          sys.path.insert(0, '.')
          import qurl_conformance as q

          r = q.relay_knock_vectors()
          a = q.agent_registration_vectors()
          s = q.agent_assignment_vectors()
          k = q.agent_knock_application_vectors()
          i = q.agent_api_key_id_vectors()
          t = q.assignment_ticket_vectors()
          replies = {v['name']: v for v in k['reply_cases']}
          requests = {v['name']: v for v in k['request_cases']}
          id_responses = {v['name']: v for v in i['consumer_response_cases']}
          canonical = '0123456789abcdef'
          resource = 'connector-conformance-01'
          # Stock JSON parsing is intentionally insufficient for these cases:
          # duplicate keys collapse last-wins and aliases remain unchecked.
          lossy_duplicate = json.loads(requests['reject_duplicate_run_id']['body_json'])
          unchecked_alias = json.loads(requests['reject_alias_run_id']['body_json'])
          assert q.qv2_vectors()['classes'] and q.issuer_signature_vectors()['issuer']
          assert r['knock']['packet_hex'] and r['ack']['packet_hex']
          assert a['otp']['packet_hex'] and a['rak_success']['packet_hex']
          assert s['schema_version'] == 2
          assert s['public_registration_key_kinds'] == ['bootstrap', 'connector_bootstrap', 'account', 'agent']
          assert s['initial_assignment']['request']['header_type'] == 5
          assert s['initial_assignment']['result']['header_type'] == 6
          assert s['initial_assignment']['request']['counter'] == s['initial_assignment']['result']['counter']
          initial_assignment = json.loads(s['initial_assignment']['result']['body_json'])['list']
          refresh_assignment = json.loads(s['refresh_assignment']['result']['body_json'])['list']
          registration = json.loads(s['assigned_cell_registration']['request']['body_json'])
          completion_request = json.loads(s['registration_completion']['request']['body_json'])
          device_api_key = completion_request['usrData']['device_api_key']
          device_api_key_prefix = 'lv_live_'
          device_api_key_secret_bytes = 32
          device_api_key_body = device_api_key.removeprefix(device_api_key_prefix)
          device_api_key_bytes = base64.urlsafe_b64decode(
              device_api_key_body + '=' * (-len(device_api_key_body) % 4)
          )
          assert device_api_key.startswith(device_api_key_prefix)
          assert device_api_key_bytes == bytes(range(device_api_key_secret_bytes))
          assert base64.urlsafe_b64encode(device_api_key_bytes).decode().rstrip('=') == device_api_key_body
          account_otp = s['account_credential_otp']
          account_otp_request = json.loads(account_otp['request']['body_json'])
          account_otp_binding = account_otp['enrollment_binding']
          account_otp_requests = {v['name']: v for v in account_otp['request_cases']}
          account_otp_bindings = {v['name']: v for v in account_otp['binding_cases']}
          account_otp_challenge_bindings = {v['name']: v for v in account_otp['challenge_binding_cases']}
          account_otp_sizes = {v['name']: v for v in account_otp['packet_size_contract']['cases']}
          completion = json.loads(s['registration_completion']['result']['body_json'])['list']
          assignment_requests = {v['name']: v for v in s['request_cases']}
          assignment_results = {v['name']: v for v in s['success_result_cases']}
          assignment_malformed = {v['name']: v for v in s['error_contract']['malformed_cases']}
          assert s['assigned_cell_registration']['request']['header_type'] == 13
          assert s['assigned_cell_registration']['result']['header_type'] == 14
          assert s['assigned_cell_registration']['request']['counter'] == s['assigned_cell_registration']['result']['counter']
          assert account_otp['producer_revision'] == '2072546e1fc76eb76bd7e5c22d37856019ba33e7'
          assert account_otp['raw_body_required'] is True
          assert account_otp['authenticated_peer_public_key_required'] is True
          assert account_otp['otp_registration_key_kinds'] == ['account']
          assert account_otp['otp_free_registration_key_kinds'] == ['bootstrap', 'connector_bootstrap', 'agent']
          assert account_otp['request']['header_type'] == 12
          assert account_otp['request']['receiver_key'] == 'assigned_cell'
          assert account_otp_request['usrId'] == account_otp_binding['request_registration_key_id']
          assert account_otp_request['devId'] == account_otp_binding['request_agent_id']
          assert account_otp_request['pass'] == account_otp_binding['request_credential']
          assert account_otp_request['usrData']['query'] == 'agent_registration_otp'
          assert account_otp_request['usrData']['version'] == 1
          assert account_otp_request['usrData']['assignment_ticket'] == account_otp_binding['request_assignment_ticket']
          assert account_otp_binding['request_credential_hash_b64'] == account_otp_binding['ticket_credential_key_hash_b64']
          assert account_otp_binding['recomputed_credential_fence_b64'] == account_otp_binding['ticket_credential_fence_b64']
          assert account_otp['challenge_binding']['lookup_key_field'] == 'ticket_jti'
          assert account_otp['challenge_binding']['required_match_fields'] == ['ticket_jti', 'authenticated_peer_public_key_b64', 'dev_id', 'credential_key_id', 'environment_id', 'cell_id']
          assert account_otp['challenge_binding']['ticket_jti'] == account_otp_binding['ticket_jti']
          assert account_otp['challenge_binding']['authenticated_peer_public_key_b64'] == account_otp_binding['authenticated_peer_public_key_b64']
          assert account_otp['challenge_binding']['dev_id'] == account_otp_binding['request_agent_id']
          assert account_otp['challenge_binding']['credential_key_id'] == account_otp_binding['request_registration_key_id']
          assert account_otp['challenge_binding']['environment_id'] == account_otp_binding['local_environment_id']
          assert account_otp['challenge_binding']['cell_id'] == account_otp_binding['local_cell_id']
          assert 'pubKey' not in account_otp_request
          assert account_otp_binding['ticket_expires_at_unix'] - account_otp_binding['evaluated_at_unix'] == 630
          assert account_otp_binding['minimum_ticket_remaining_seconds'] == 630
          assert len(account_otp['request_cases']) == 17
          assert account_otp_requests['reject_duplicate_otp_assignment_ticket']['reject_class'] == 'body_parse'
          assert account_otp_requests['reject_empty_otp_usr_id']['reject_class'] == 'semantic'
          assert account_otp_requests['reject_empty_otp_dev_id']['reject_class'] == 'semantic'
          assert account_otp_requests['reject_wrong_otp_asp_id']['reject_class'] == 'semantic'
          assert account_otp_requests['reject_unknown_otp_outer_field']['reject_class'] == 'unknown_field'
          assert account_otp_requests['reject_null_otp_body']['reject_class'] == 'wrong_type'
          assert account_otp_requests['reject_trailing_otp_value']['reject_class'] == 'body_parse'
