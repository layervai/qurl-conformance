version: 2
updates:
  # Go modules — three independent module roots in this repo.
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /tools/gen
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: gomod
    directory: /tools/verify-sdk
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, go]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # JavaScript / npm package.
  - package-ecosystem: npm
    directory: /npm
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, npm]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # Python package.
  - package-ecosystem: pip
    directory: /python
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  # GitHub Actions workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: "chore(ci)"
